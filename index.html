<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mx</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <div id="app">
      <div id="toolbar">
        <div id="file-info">
          <span id="filename">No file open</span>
          <span id="modified-indicator" class="hidden">●</span>
        </div>
        <div id="toolbar-actions">
          <!-- Dropdown menus -->
          <div class="toolbar-dropdown">
            <button id="btn-file-menu">File <span class="arrow">▾</span></button>
            <div class="dropdown-menu hidden">
              <div id="btn-open" class="dropdown-item">Open File <span class="shortcut">⌘O</span></div>
              <div id="btn-open-folder" class="dropdown-item">Open Folder</div>
              <div id="btn-recent" class="dropdown-item">Recent Files</div>
              <div class="dropdown-divider"></div>
              <div id="btn-save" class="dropdown-item">Save <span class="shortcut">⌘S</span></div>
              <div class="dropdown-divider"></div>
              <div id="btn-export-pdf" class="dropdown-item">Export PDF</div>
            </div>
          </div>
          <div class="toolbar-dropdown">
            <button id="btn-view-menu">View <span class="arrow">▾</span></button>
            <div class="dropdown-menu hidden">
              <div id="btn-toggle-sidebar" class="dropdown-item">Toggle Sidebar <span class="shortcut">⌘B</span></div>
              <div id="btn-toggle-preview" class="dropdown-item">Toggle Preview <span class="shortcut">⌘P</span></div>
              <div id="btn-read-mode" class="dropdown-item">Read Mode <span class="shortcut">⌘E</span></div>
            </div>
          </div>
          <div class="toolbar-dropdown">
            <button id="btn-help-menu">Help <span class="arrow">▾</span></button>
            <div class="dropdown-menu hidden">
              <div id="btn-check-updates" class="dropdown-item">Check for Updates…</div>
              <div id="btn-about" class="dropdown-item">About mx</div>
            </div>
          </div>

          <span class="toolbar-sep"></span>

          <!-- Primary actions -->
          <button id="btn-copy-html" title="Copy formatted (Cmd+Shift+C)">Copy</button>
          <span class="toolbar-sep"></span>
          <button id="btn-zoom-out" title="Zoom out (Cmd+-)">−</button>
          <span id="status-zoom" class="toolbar-zoom">100%</span>
          <button id="btn-zoom-in" title="Zoom in (Cmd+=)">+</button>
        </div>
        <div id="token-info">
          <span id="token-count">0 words</span>
          <span id="cost-estimate" class="dim">0 lines</span>
        </div>
      </div>
      <div id="recent-panel" class="hidden">
        <div id="recent-list"></div>
      </div>
      <div id="editor-container">
        <div id="sidebar" class="hidden">
          <div id="sidebar-header">
            <span id="sidebar-title">Files</span>
          </div>
          <div id="sidebar-tree"></div>
        </div>
        <div id="editor-pane"></div>
        <div id="divider"></div>
        <div id="preview-pane"></div>
      </div>
      <div id="statusbar">
        <span id="status-position">Ln 1, Col 1</span>
        <span id="status-words">0 words</span>
        <span id="status-tokens">0 chars</span>
        <a id="status-github" href="https://github.com/vibery-studio/mx" target="_blank">GitHub</a>
      </div>
    </div>
  </body>
</html>
